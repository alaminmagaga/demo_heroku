<!DOCTYPE html>
<html >

<head>
  <meta charset="UTF-8">
  <title>ML API</title>
  <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Arimo' rel='stylesheet' type='text/css'>

<body style='background-color: tomato'>
 <div class="login">
	<h1>Predict Salary Analysis</h1>

     
    <form action="{{ url_for('predict')}}"method="post">
    	<input type="text" name="experience" style="padding: 20px" placeholder="Experience" required="required" />
        <input type="text" name="test_score"style="padding: 20px" placeholder="Test Score" required="required" />
		<input type="text" name="interview_score" style="padding: 20px" placeholder="Interview Score" required="required" />

        <button type="submit" style="padding: 15px;border-radius:10px" class="btn btn-primary btn-block btn-large">Predict</button>
    </form>

   <br>
   <br>
   {{ prediction_text }}

 </div>


</body>
</html>
